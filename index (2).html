<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa de Corte — MultiTela CazeTV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg:       #080809;
  --s1:       #0f0f12;
  --s2:       #161619;
  --s3:       #1e1e23;
  --border:   #2a2a32;
  --border2:  #38383f;
  --pgm:      #d63031;
  --pgm-dim:  rgba(214,48,49,.15);
  --pgm-glow: rgba(214,48,49,.45);
  --pvw:      #00b894;
  --pvw-dim:  rgba(0,184,148,.12);
  --pvw-glow: rgba(0,184,148,.35);
  --accent:   #fdcb6e;
  --acc-dim:  rgba(253,203,110,.12);
  --blue:     #0984e3;
  --text:     #e8e8ed;
  --text2:    #8e8e9e;
  --text3:    #4a4a5a;
  --r:        5px;
  --r2:       9px;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

.app { width: 100%; max-width: 1240px; padding: 14px 18px 30px; }

/* ── HEADER ─────────────────────────────── */
header {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.logo { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: .5px; }
.logo b { color: var(--accent); font-weight: 500; }
.pcs { display: flex; gap: 4px; margin-left: auto; }
.pc-btn {
  font-family: var(--mono); font-size: 11px; padding: 5px 10px;
  background: var(--s2); color: var(--text2);
  border: 1px solid var(--border); border-radius: var(--r); cursor: pointer;
}
.pc-btn.on { background: var(--acc-dim); color: var(--accent); border-color: var(--accent); }
.status { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text2); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.dot.ok  { background: var(--pvw); box-shadow: 0 0 8px var(--pvw-glow); }
.dot.err { background: var(--pgm); box-shadow: 0 0 8px var(--pgm-glow); }

/* ── PAINEL DEV ─────────────────────────── */
.dev-btn.on { background: var(--pgm-dim); color: #ff7675; border-color: var(--pgm); }
.dev-panel {
  display: none; margin-bottom: 14px; padding: 12px 14px;
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--r2);
}
.dev-panel.open { display: block; }
.dev-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--text2); margin-bottom: 10px; }
.dev-hint { letter-spacing: 0; color: var(--text3); margin-left: 8px; text-transform: none; }
.dev-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.dev-row .dev-pc {
  font-family: var(--mono); font-size: 11px; color: var(--text);
  flex: 0 0 44px;
}
.dev-row input {
  font-family: var(--mono); font-size: 12px; color: var(--text);
  background: var(--s2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 6px 10px; width: 180px; outline: none;
}
.dev-row input:focus { border-color: var(--accent); }
.dev-row input.mod { border-color: var(--accent); color: var(--accent); }
.dev-reset {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  background: none; border: 1px solid var(--border); border-radius: 3px;
  color: var(--text3); padding: 4px 8px; cursor: pointer; visibility: hidden;
}
.dev-row .dev-reset.show { visibility: visible; }
.dev-reset:hover { color: var(--pgm); border-color: var(--pgm); }
.dev-def { font-family: var(--mono); font-size: 9px; color: var(--text3); }

/* ── PVW + HISTÓRICO ────────────────────── */
.stage { display: flex; gap: 14px; margin-bottom: 16px; align-items: stretch; }

.hist {
  flex: 0 0 220px; display: flex; flex-direction: column;
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--r2);
  overflow: hidden; position: relative;
}
.hist-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--text2);
}
.hist-clear {
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  background: none; border: none; cursor: pointer; letter-spacing: 1px;
}
.hist-clear:hover { color: var(--pgm); }
.hist-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.hist-empty {
  position: absolute; inset: 40px 0 0 0; display: flex; align-items: center; justify-content: center;
  text-align: center; font-family: var(--mono); font-size: 10px; color: var(--text3);
  line-height: 1.8; pointer-events: none;
}
.h-item {
  padding: 8px 10px; border-bottom: 1px solid var(--border);
  cursor: pointer; position: relative;
}
.h-item:hover { background: var(--s2); }
.h-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.h-badge {
  font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
  padding: 2px 6px; border-radius: 3px;
}
.h-badge.ar { background: var(--pgm-dim); color: #ff7675; border: 1px solid rgba(214,48,49,.4); }
.h-badge.pl { background: var(--acc-dim); color: var(--accent); border: 1px solid rgba(253,203,110,.35); }
.h-mt { font-family: var(--mono); font-size: 11px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-time { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.h-pips { font-family: var(--mono); font-size: 9px; color: var(--text2); line-height: 1.5; }
.h-del {
  position: absolute; top: 6px; right: 8px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  background: none; border: none; cursor: pointer; display: none;
}
.h-item:hover .h-del { display: block; }
.h-del:hover { color: var(--pgm); }

/* ── PVW ────────────────────────────────── */
.pvw-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; }
.pvw {
  position: relative; width: 100%; max-width: 780px; aspect-ratio: 16/9;
  background: #050506; border: 2px solid var(--pvw);
  border-radius: var(--r2); overflow: hidden;
  box-shadow: 0 0 24px rgba(0,184,148,.12), inset 0 0 60px rgba(0,0,0,.6);
}
.pvw-tag {
  position: absolute; top: 8px; left: 10px; z-index: 5;
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
  color: var(--pvw); background: rgba(0,0,0,.55);
  padding: 3px 8px; border-radius: 3px; border: 1px solid rgba(0,184,148,.4);
}
.pvw-empty {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 1px;
}
.box {
  position: absolute; border: 1px solid var(--border2);
  background: linear-gradient(160deg, #101014, #0a0a0d);
  border-radius: 3px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px; overflow: hidden;
}
.box.pip { cursor: default; }
.box.pip.filled { border-color: var(--accent); background: linear-gradient(160deg, #17150e, #0d0c08); }
.box .n {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  position: absolute; top: 4px; left: 6px;
}
.box.filled .n { color: var(--accent); }
.box .lbl { font-family: var(--mono); font-size: clamp(9px, 1.4vw, 13px); color: var(--text2); text-align: center; padding: 0 4px; }
.box.filled .lbl { color: var(--text); }
.box.sinal { border-style: dashed; border-color: var(--border); }
.box.sinal .lbl { color: var(--text3); letter-spacing: 1px; font-size: 11px; }

.pvw-bar {
  width: 100%; max-width: 780px;
  display: flex; align-items: center; gap: 12px; margin-top: 8px;
}
.mt-name { font-family: var(--mono); font-size: 13px; color: var(--pvw); flex: 1; letter-spacing: .5px; }
.take {
  font-family: var(--sans); font-weight: 700; font-size: 14px; letter-spacing: 2px;
  padding: 10px 34px; border-radius: var(--r2); cursor: pointer;
  background: var(--pgm-dim); color: var(--pgm); border: 2px solid var(--pgm);
  transition: background .1s;
}
.take:hover { background: var(--pgm); color: #fff; box-shadow: 0 0 18px var(--pgm-glow); }
.take:active { transform: scale(.97); }
.take:disabled { opacity: .3; cursor: not-allowed; }
.plist {
  font-family: var(--sans); font-weight: 700; font-size: 12px; letter-spacing: 1px;
  padding: 10px 18px; border-radius: var(--r2); cursor: pointer;
  background: var(--acc-dim); color: var(--accent); border: 2px solid var(--accent);
  transition: background .1s;
}
.plist:hover { background: var(--accent); color: #16130a; }
.plist:active { transform: scale(.97); }
.plist:disabled { opacity: .3; cursor: not-allowed; }

@media (max-width: 900px) {
  .stage { flex-direction: column; }
  .hist { flex: 0 0 auto; max-height: 180px; }
  .hist-empty { inset: 40px 0 0 0; }
}

/* ── LINHAS DE BOTÕES ───────────────────── */
.row { display: flex; align-items: stretch; gap: 8px; margin-bottom: 10px; }
.row-tag {
  flex: 0 0 88px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--r);
  font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 1px;
  user-select: none;
}
.row-tag .big { font-size: 13px; color: var(--text); }
.row-tag.mt-tag .big { color: var(--pvw); }
.shift {
  margin-top: 2px; font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 3px; cursor: pointer;
  background: var(--s3); color: var(--text2); border: 1px solid var(--border2);
}
.shift.on { background: var(--acc-dim); color: var(--accent); border-color: var(--accent); }

.strip {
  flex: 1; display: flex; gap: 6px; overflow-x: auto; padding: 6px;
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--r);
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  cursor: grab;
}
.strip.dragging { cursor: grabbing; }
.strip::-webkit-scrollbar { height: 6px; }
.strip::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.btn {
  flex: 0 0 auto; min-width: 92px; padding: 12px 10px;
  font-family: var(--mono); font-size: 12px; text-align: center;
  background: var(--s2); color: var(--text2);
  border: 1px solid var(--border); border-radius: var(--r); cursor: pointer;
  user-select: none; white-space: nowrap;
  transition: border-color .08s, background .08s;
}
.btn:hover { border-color: var(--border2); color: var(--text); }
.btn:active { transform: scale(.97); }

/* multitela selecionada = verde pvw */
.btn.sel-mt { background: var(--pvw-dim); color: var(--pvw); border-color: var(--pvw); box-shadow: 0 0 10px rgba(0,184,148,.2); }
/* input cortado no pip = vermelho pgm */
.btn.sel-in { background: var(--pgm-dim); color: #ff6b6b; border-color: var(--pgm); box-shadow: 0 0 10px rgba(214,48,49,.25); }

.btn .sub { display: block; font-size: 9px; color: var(--text3); margin-top: 3px; letter-spacing: .5px; }
.btn.sel-mt .sub { color: rgba(0,184,148,.7); }

/* toast */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 12px; padding: 9px 18px;
  background: var(--s3); border: 1px solid var(--border2); border-radius: var(--r2);
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 99;
}
#toast.show { opacity: 1; }
#toast.err { border-color: var(--pgm); color: #ff8a8a; }

@media (max-width: 700px) {
  .row-tag { flex: 0 0 64px; font-size: 9px; }
  .btn { min-width: 76px; font-size: 11px; padding: 10px 8px; }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">MESA DE CORTE <b>MULTITELA</b> — CazeTV</div>
    <div class="pcs" id="pcs"></div>
    <button class="pc-btn dev-btn" id="dev-btn">DEV</button>
    <div class="status"><div class="dot" id="dot"></div><span id="st-txt">sem conexão</span></div>
  </header>

  <!-- PAINEL DEV: edição de IPs -->
  <div class="dev-panel" id="dev-panel">
    <div class="dev-title">IP DAS MÁQUINAS <span class="dev-hint">edite pra testar em outro computador — presets continuam salvos</span></div>
    <div id="dev-rows"></div>
  </div>

  <!-- PVW + HISTÓRICO -->
  <div class="stage">

    <aside class="hist">
      <div class="hist-head">
        <span>HISTÓRICO</span>
        <button class="hist-clear" id="hist-clear" title="Limpar tudo">limpar</button>
      </div>
      <div class="hist-list" id="hist-list"></div>
      <div class="hist-empty" id="hist-empty">Cortes e playlists<br>aparecem aqui</div>
    </aside>

    <div class="pvw-wrap">
      <div class="pvw" id="pvw">
        <div class="pvw-tag">PVW</div>
        <div class="pvw-empty" id="pvw-empty">SELECIONE UMA MULTITELA ABAIXO</div>
      </div>
      <div class="pvw-bar">
        <div class="mt-name" id="mt-name">—</div>
        <button class="plist" id="plist" disabled>+ PLAYLIST</button>
        <button class="take" id="take" disabled>CORTAR</button>
      </div>
    </div>

  </div>

  <!-- LINHA 1: MULTITELAS -->
  <div class="row">
    <div class="row-tag mt-tag"><span>LINHA 1</span><span class="big">MTELAS</span></div>
    <div class="strip" id="strip-mt"></div>
  </div>

  <!-- LINHA 2: PIP 1 -->
  <div class="row">
    <div class="row-tag"><span>LINHA 2</span><span class="big">PIP 1</span></div>
    <div class="strip" id="strip-p1"></div>
  </div>

  <!-- LINHA 3: PIP 2 -->
  <div class="row">
    <div class="row-tag"><span>LINHA 3</span><span class="big">PIP 2</span></div>
    <div class="strip" id="strip-p2"></div>
  </div>

  <!-- LINHA 4: PIP 3 (com SHIFT -> PIP 4 / PIP 5) -->
  <div class="row">
    <div class="row-tag">
      <span>LINHA 4</span><span class="big" id="p3-lbl">PIP 3</span>
      <button class="shift" id="shift">SHIFT ▸</button>
    </div>
    <div class="strip" id="strip-p3"></div>
  </div>

</div>

<div id="toast"></div>

<script>
/* ═══════════════════ CONFIG ═══════════════════
   Edite aqui se mudar nomes, layers ou ordem dos pips.
   - "title"  : nome EXATO do input no vMix (cuidado com espaços no final!)
   - "layers" : layers XML dos pips (Overlay5..8 no arquivo .vmix).
                A API do vMix usa índice 1-10, então o app soma +1 sozinho.
   - "pips"   : geometria normalizada [x,y,w,h] em ordem de leitura
                (esquerda→direita, cima→baixo). pips[i] usa layers[i].
   - "sinal"  : área central fixa (não cortável), só desenho.            */

const PCS = {
  'PD2': '10.10.0.102', 'PD3': '10.10.0.103', 'PD4': '10.10.0.104',
  'PD5': '10.10.0.105', 'PD6': '10.10.0.106',
};

const MULTITELAS = [
  { title: '50:50 COPA MONTADO', label: '50:50', layers: [7,8],
    pips: [[.010,.260,.485,.480],[.505,.260,.485,.480]] },

  { title: '80:20 COPA MONTADO', label: '80:20', layers: [7,8],
    pips: [[.010,.110,.760,.780],[.780,.560,.210,.330]] },

  { title: '60:40 COPA MONTADO', label: '60:40', layers: [7,8],
    pips: [[.010,.230,.580,.540],[.600,.230,.390,.540]] },

  { title: '60:40+1 COPA MONTADO ', label: '60:40 +1', layers: [6,7,8],
    pips: [[.010,.160,.580,.680],[.600,.160,.390,.400],[.600,.580,.390,.260]] },

  { title: '60:40+2 COPA MONTADO ', label: '60:40 +2', layers: [5,6,7,8],
    pips: [[.010,.160,.580,.680],[.600,.160,.390,.380],[.600,.560,.188,.280],[.800,.560,.190,.280]] },

  { title: '60:40 +1 VERTICAL MONTADO', label: '60:40 +1 VERT', layers: [6,7,8],
    pips: [[.010,.160,.560,.680],[.585,.160,.260,.680],[.860,.160,.130,.680]] },

  { title: '2+ SINAL +2 MONTADO', label: '2+ SINAL +2', layers: [5,6,7,8],
    sinal: [.200,.195,.600,.575],
    pips: [[.010,.195,.180,.280],[.810,.195,.180,.280],[.010,.490,.180,.280],[.810,.490,.180,.280]] },

  { title: '1+ SINAL +1 MONTADO', label: '1+ SINAL +1', layers: [7,8],
    sinal: [.200,.195,.600,.575],
    pips: [[.010,.195,.180,.575],[.810,.195,.180,.575]] },

  { title: '3+ SINAL +1 MONTADO', label: '3+ SINAL +1', layers: [5,6,7,8],
    sinal: [.200,.195,.600,.575],
    pips: [[.010,.195,.180,.180],[.810,.195,.180,.575],[.010,.393,.180,.180],[.010,.590,.180,.180]] },

  { title: '2+ SINAL +1 MONTADO', label: '2+ SINAL +1', layers: [6,7,8],
    sinal: [.200,.195,.600,.575],
    pips: [[.010,.195,.180,.280],[.810,.195,.180,.575],[.010,.490,.180,.280]] },
];

const INPUTS = [
  { title: 'IN 1',                 label: 'IN 1' },
  { title: 'IN 2',                 label: 'IN 2' },
  { title: 'IN 3',                 label: 'IN 3' },
  { title: 'IN 4',                 label: 'IN 4' },
  { title: 'IN 5',                 label: 'IN 5' },
  { title: 'CALL 1',               label: 'CALL 1' },
  { title: 'CALL 2',               label: 'CALL 2' },
  { title: 'CONTEÚDO HORIZONTAL',  label: 'CONT HOR' },
  { title: 'ADBREAK MONTADO',      label: 'ADBREAK' },
  { title: 'CONTEUDO VERTICAL',    label: 'CONT VER' },
  { title: 'replay',               label: 'REPLAY A' },
  { title: 'replay - B',           label: 'REPLAY B' },
];

/* ═══════════════════ STATE ═══════════════════ */
let pc       = localStorage.getItem('mc_pc') || 'PD2';
let selMT    = null;                       // index em MULTITELAS
let shiftPos = 0;                          // 0=PIP3  1=PIP4  2=PIP5
let assign   = {};                         // { mtIndex: { pipNum: inputTitle } }
try { assign = JSON.parse(localStorage.getItem('mc_assign') || '{}'); } catch(e) {}
let history  = [];                         // [{kind:'ar'|'pl', mt:index, pips:{...}, time:'HH:MM:SS'}]
try { history = JSON.parse(localStorage.getItem('mc_hist') || '[]'); } catch(e) {}
let ipOver   = {};                         // { 'PD2': '192.168.0.50', ... } — overrides dos presets
try { ipOver = JSON.parse(localStorage.getItem('mc_ips') || '{}'); } catch(e) {}

const $ = id => document.getElementById(id);
const ipOf = k => ipOver[k] || PCS[k];
const api = () => `http://${ipOf(pc)}:8088/api/?`;

/* ═══════════════════ vMIX ═══════════════════ */
async function vmix(params) {
  const url = api() + params;
  try {
    await fetch(url, { mode: 'no-cors' });
    setStatus(true);
    return true;
  } catch(e) {
    setStatus(false);
    toast('Falha ao falar com o vMix (' + pc + ')', true);
    return false;
  }
}

function setStatus(ok) {
  $('dot').className = 'dot ' + (ok ? 'ok' : 'err');
  $('st-txt').textContent = ok ? pc + ' · ' + ipOf(pc) : 'sem conexão';
}

/* corta input num pip: SetMultiViewOverlay usa índice 1-10 (XML é 0-9) */
function cutPip(pipNum, inputTitle) {
  if (selMT === null) { toast('Selecione uma multitela primeiro', true); return; }
  const mt = MULTITELAS[selMT];
  if (pipNum > mt.layers.length) {
    toast(`${mt.label} só tem ${mt.layers.length} pip${mt.layers.length>1?'s':''}`, true);
    return;
  }
  const apiLayer = mt.layers[pipNum - 1] + 1;
  vmix(`Function=SetMultiViewOverlay&Input=${encodeURIComponent(mt.title)}&Value=${apiLayer},${encodeURIComponent(inputTitle)}`);

  if (!assign[selMT]) assign[selMT] = {};
  assign[selMT][pipNum] = inputTitle;
  localStorage.setItem('mc_assign', JSON.stringify(assign));
  render();
}

function selectMT(i) {
  selMT = i;
  vmix(`Function=PreviewInput&Input=${encodeURIComponent(MULTITELAS[i].title)}`);
  render();
}

/* ═══════════════════ HISTÓRICO ═══════════════════ */
function saveEntry(kind) {
  if (selMT === null) return;
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  history.unshift({
    kind,                                   // 'ar' = foi ao ar | 'pl' = playlist
    mt: selMT,
    pips: { ...(assign[selMT] || {}) },
    time,
  });
  if (history.length > 60) history.pop();   // limite de segurança
  localStorage.setItem('mc_hist', JSON.stringify(history));
  renderHistory();
}

function recallEntry(idx) {
  const h = history[idx];
  if (!h) return;
  selMT = h.mt;
  assign[selMT] = { ...h.pips };
  localStorage.setItem('mc_assign', JSON.stringify(assign));

  /* reaplica os cortes no vMix e joga no preview */
  const mt = MULTITELAS[selMT];
  Object.entries(h.pips).forEach(([pipNum, inputTitle]) => {
    const apiLayer = mt.layers[pipNum - 1] + 1;
    vmix(`Function=SetMultiViewOverlay&Input=${encodeURIComponent(mt.title)}&Value=${apiLayer},${encodeURIComponent(inputTitle)}`);
  });
  vmix(`Function=PreviewInput&Input=${encodeURIComponent(mt.title)}`);
  toast('Recuperado: ' + mt.label);
  render();
}

/* ═══════════════════ PAINEL DEV ═══════════════════ */
function renderDev() {
  $('dev-rows').innerHTML = Object.keys(PCS).map(k => {
    const mod = !!ipOver[k];
    return `<div class="dev-row">
      <span class="dev-pc">${k}</span>
      <input type="text" data-ip="${k}" value="${ipOf(k)}" class="${mod ? 'mod' : ''}" spellcheck="false">
      <button class="dev-reset ${mod ? 'show' : ''}" data-ipreset="${k}">padrão</button>
      <span class="dev-def">${mod ? 'preset: ' + PCS[k] : ''}</span>
    </div>`;
  }).join('');

  $('dev-rows').querySelectorAll('input[data-ip]').forEach(inp => {
    inp.addEventListener('change', () => {
      const k = inp.dataset.ip;
      const v = inp.value.trim();
      if (!v || v === PCS[k]) delete ipOver[k];
      else ipOver[k] = v;
      localStorage.setItem('mc_ips', JSON.stringify(ipOver));
      renderDev();
      setStatus(true);
      toast(k + ' → ' + ipOf(k));
    });
  });
}

function renderHistory() {
  const list = $('hist-list');
  $('hist-empty').style.display = history.length ? 'none' : 'flex';
  list.innerHTML = history.map((h, i) => {
    const mt = MULTITELAS[h.mt];
    const pipsTxt = Object.entries(h.pips)
      .sort((a, b) => a[0] - b[0])
      .map(([n, t]) => `${n}·${INPUTS.find(x => x.title === t)?.label || t}`)
      .join('  ') || 'sem pips';
    return `<div class="h-item" data-h="${i}">
      <div class="h-top">
        <span class="h-badge ${h.kind}">${h.kind === 'ar' ? 'NO AR' : 'PLAYLIST'}</span>
        <span class="h-mt">${mt.label}</span>
        <span class="h-time">${h.time}</span>
      </div>
      <div class="h-pips">${pipsTxt}</div>
      <button class="h-del" data-hdel="${i}" title="Remover">✕</button>
    </div>`;
  }).join('');
}

/* ═══════════════════ RENDER ═══════════════════ */
function render() {
  /* PCs */
  $('pcs').innerHTML = Object.keys(PCS).map(k =>
    `<button class="pc-btn ${k===pc?'on':''}" data-pc="${k}">${k}</button>`).join('');

  /* PVW */
  const pvw = $('pvw');
  pvw.querySelectorAll('.box').forEach(b => b.remove());
  if (selMT === null) {
    $('pvw-empty').style.display = 'flex';
    $('mt-name').textContent = '—';
    $('take').disabled = true;
    $('plist').disabled = true;
  } else {
    $('pvw-empty').style.display = 'none';
    const mt = MULTITELAS[selMT];
    $('mt-name').textContent = mt.title.trim();
    $('take').disabled = false;
    $('plist').disabled = false;

    if (mt.sinal) {
      const [x,y,w,h] = mt.sinal;
      const d = document.createElement('div');
      d.className = 'box sinal';
      d.style.cssText = `left:${x*100}%;top:${y*100}%;width:${w*100}%;height:${h*100}%`;
      d.innerHTML = `<span class="lbl">SINAL</span>`;
      pvw.appendChild(d);
    }
    mt.pips.forEach((p, i) => {
      const [x,y,w,h] = p;
      const num = i + 1;
      const inp = assign[selMT]?.[num];
      const d = document.createElement('div');
      d.className = 'box pip' + (inp ? ' filled' : '');
      d.style.cssText = `left:${x*100}%;top:${y*100}%;width:${w*100}%;height:${h*100}%`;
      const lbl = inp ? (INPUTS.find(x2 => x2.title === inp)?.label || inp) : 'vazio';
      d.innerHTML = `<span class="n">${num}</span><span class="lbl">${lbl}</span>`;
      pvw.appendChild(d);
    });
  }

  /* Linha 1 — multitelas */
  $('strip-mt').innerHTML = MULTITELAS.map((m, i) =>
    `<button class="btn ${i===selMT?'sel-mt':''}" data-mt="${i}">${m.label}<span class="sub">${m.layers.length} pips</span></button>`).join('');

  /* Linhas de inputs */
  renderInputStrip('strip-p1', 1);
  renderInputStrip('strip-p2', 2);
  const p3pip = 3 + shiftPos;
  $('p3-lbl').textContent = 'PIP ' + p3pip;
  $('shift').textContent = shiftPos === 0 ? 'SHIFT ▸' : (shiftPos === 1 ? 'PIP 4 ▸' : 'PIP 5 ⟲');
  $('shift').classList.toggle('on', shiftPos > 0);
  renderInputStrip('strip-p3', p3pip);
}

function renderInputStrip(stripId, pipNum) {
  const cur = selMT !== null ? assign[selMT]?.[pipNum] : null;
  $(stripId).innerHTML = INPUTS.map(inp =>
    `<button class="btn ${inp.title===cur?'sel-in':''}" data-pip="${pipNum}" data-in="${encodeURIComponent(inp.title)}">${inp.label}</button>`).join('');
}

/* ═══════════════════ EVENTS ═══════════════════ */
document.addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b || suppressClick) return;

  if (b.dataset.pc) {
    pc = b.dataset.pc;
    localStorage.setItem('mc_pc', pc);
    setStatus(true);
    render();
  }
  else if (b.dataset.mt !== undefined) selectMT(+b.dataset.mt);
  else if (b.dataset.in !== undefined) cutPip(+b.dataset.pip, decodeURIComponent(b.dataset.in));
  else if (b.dataset.hdel !== undefined) {
    history.splice(+b.dataset.hdel, 1);
    localStorage.setItem('mc_hist', JSON.stringify(history));
    renderHistory();
  }
  else if (b.dataset.h !== undefined || b.closest('.h-item')) {
    /* clique no item do histórico (fora do X) */
  }
  else if (b.id === 'shift') { shiftPos = (shiftPos + 1) % 3; render(); }
  else if (b.id === 'take') {
    vmix('Function=Cut');
    saveEntry('ar');
    toast('CORTADO → ' + MULTITELAS[selMT].title.trim());
  }
  else if (b.id === 'plist') {
    saveEntry('pl');
    toast('Salvo na playlist: ' + MULTITELAS[selMT].label);
  }
  else if (b.id === 'hist-clear') {
    history = [];
    localStorage.setItem('mc_hist', '[]');
    renderHistory();
  }
  else if (b.id === 'dev-btn') {
    $('dev-panel').classList.toggle('open');
    b.classList.toggle('on');
  }
  else if (b.dataset.ipreset !== undefined) {
    delete ipOver[b.dataset.ipreset];
    localStorage.setItem('mc_ips', JSON.stringify(ipOver));
    renderDev();
    setStatus(true);
    toast(b.dataset.ipreset + ' restaurado: ' + PCS[b.dataset.ipreset]);
  }
});

/* clique no card do histórico (recall) */
document.addEventListener('click', e => {
  if (suppressClick) return;
  if (e.target.closest('.h-del')) return;
  const item = e.target.closest('.h-item');
  if (item) recallEntry(+item.dataset.h);
});

/* drag-scroll nas faixas */
let suppressClick = false;
document.querySelectorAll('.strip').forEach(strip => {
  let down = false, startX = 0, startScroll = 0, moved = 0;
  strip.addEventListener('pointerdown', e => {
    down = true; moved = 0;
    startX = e.clientX; startScroll = strip.scrollLeft;
    strip.classList.add('dragging');
  });
  strip.addEventListener('pointermove', e => {
    if (!down) return;
    const dx = e.clientX - startX;
    moved = Math.max(moved, Math.abs(dx));
    if (moved > 5) strip.scrollLeft = startScroll - dx;
  });
  const up = () => {
    if (!down) return;
    down = false;
    strip.classList.remove('dragging');
    if (moved > 5) { suppressClick = true; setTimeout(() => suppressClick = false, 50); }
  };
  strip.addEventListener('pointerup', up);
  strip.addEventListener('pointerleave', up);
});

/* toast */
let toastT;
function toast(msg, err) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' err' : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.className = '', 2200);
}

render();
renderHistory();
renderDev();
setStatus(true);
</script>
</body>
</html>
